name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli

      - name: Install Binaryen (wasm-opt)
        run: |
          wget https://github.com/WebAssembly/binaryen/releases/download/version_130/binaryen-version_130-x86_64-linux.tar.gz
          tar -xzf binaryen-version_130-x86_64-linux.tar.gz
          echo "$(pwd)/binaryen-version_130/bin" >> $GITHUB_PATH

      - name: Build WASM (app + gen-worker)
        # --workspace builds both the app and the gen-worker binary (the slim,
        # no-Bevy off-thread generation Web Worker) for wasm in one pass.
        run: cargo build --workspace --release --target wasm32-unknown-unknown

      - name: Generate JS Bindings
        run: |
          wasm-bindgen --out-dir ./dist --target web \
            --out-name symbios-overlands \
            --no-typescript \
            target/wasm32-unknown-unknown/release/symbios-overlands.wasm
          # The off-thread generation worker the app spawns via gloo-worker as
          # "./gen-worker.js" (sits beside the app JS in ./dist).
          wasm-bindgen --out-dir ./dist --target web \
            --out-name gen-worker \
            --no-typescript \
            target/wasm32-unknown-unknown/release/gen-worker.wasm

      #- name: Optimize WASM
      #  run: wasm-opt -Oz -o ./dist/symbios-overlands_bg.wasm ./dist/symbios-overlands_bg.wasm

      - name: Assemble Site
        run: |
          cp index.html ./dist/
          cp -r assets ./dist/
          cp assets/client-metadata.json ./dist/

      - name: Clean up dist for deployment
        run: |
          find ./dist -type l -delete
          du -sh ./dist

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Check dist for links and size
        run: | 
          echo "Size of dist:" du -sh ./dist || true
          echo "Listing symlinks (if any):" SYMLINKS=$(find ./dist -type l -print) if [ -n "$SYMLINKS" ]; then echo "Symlinks found:" echo "$SYMLINKS" else echo "No symlinks found." fi
          echo "Listing files with link count >1 (possible hard links):" HARDLINKS=$(find ./dist -type f -links +1 -printf '%p (%n links)\n') if [ -n "$HARDLINKS" ]; then echo "Hard links found:" echo "$HARDLINKS" else echo "No hard links found." fi
          if [ -n "SYMLINKS"]||[-n"HARDLINKS" ]; then echo "Remove or dereference symlinks/hardlinks before uploading." exit 1 fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with: 
          path: ./dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4