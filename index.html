<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symbios Overlands</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #222;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        #loading {
            color: white;
            font-family: monospace;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            pointer-events: none;
        }
    </style>
    <script>
        // Browser autoplay policy: an AudioContext starts suspended and may
        // only be resumed after a user gesture. cpal (Bevy -> rodio) creates
        // its context during wasm init -- before any gesture -- so it stays
        // suspended and no audio plays. Track every context the page creates,
        // then resume them on the first user interaction. This classic script
        // runs synchronously, ahead of the deferred module below, so the
        // constructor is patched before init() spins up the audio backend.
        (function () {
            const Original = window.AudioContext || window.webkitAudioContext;
            if (!Original) return;
            const contexts = [];
            function Tracked() {
                const ctx = new Original(...arguments);
                contexts.push(ctx);
                return ctx;
            }
            Tracked.prototype = Original.prototype;
            window.AudioContext = window.webkitAudioContext = Tracked;

            const resumeAll = () =>
                contexts.forEach(c => c.state === "suspended" && c.resume());
            // Not { once: true }: the context can be re-suspended when the tab
            // is backgrounded, so we resume again on the next interaction.
            ["pointerdown", "keydown", "touchend"].forEach(e =>
                window.addEventListener(e, resumeAll)
            );
        })();
    </script>
</head>

<body>
    <div id="loading">Loading...</div>
    <script type="module">
        import init from './symbios-overlands.js';
        document.addEventListener('contextmenu', event => event.preventDefault());
        async function run() {
            try {
                await init();
                document.getElementById('loading').style.display = 'none';
            } catch (e) {
                console.error("Failed to initialize:", e);
                document.getElementById('loading').innerText = "Error: " + e;
            }
        }
        run();
    </script>
</body>

</html>
