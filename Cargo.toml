[package]
name = "symbios-overlands"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = "0.18"
bevy_egui = "0.39"
bevy_panorbit_camera = { version = "0.34", features = ["bevy_egui"] }
bevy_symbios = "0.3"
bevy_symbios_ground = { version = "0.2", features = ["physics"] }
bevy_symbios_multiuser = "0.2"
bevy_symbios_texture = "0.3"
symbios = "1.4"
symbios-turtle-3d = "0.4"
avian3d = "0.6"
symbios-ground = "0.2"
serde = { version = "1.0", features = ["derive"] }
image = "0.25"
futures-lite = "2"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
tokio = { version = "1", features = ["rt", "macros"] }
serde_json = "1"
rand_chacha = "0.9"

[dev-dependencies]

[target.'cfg(target_arch = "wasm32")'.dependencies]
console_error_panic_hook = "0.1"
getrandom = { version = "0.2", features = ["js"] }
web-sys = { version = "0.3.82", features = [
    "Document",
    "Window",
    "HtmlElement",
    "HtmlAnchorElement",
    "HtmlBodyElement",
    "Node",
    "Blob",
    "Url",
    "BlobPropertyBag",
    "Clipboard",
    "ClipboardEvent",
    "Navigator",
] }
wasm-bindgen = "0.2.118"
js-sys = "0.3.82"

[profile.release]
opt-level = "s"   # Optimize for size (helps wasm-bindgen)
lto = "fat"       # Enable full Link Time Optimization (CRITICAL FIX)
codegen-units = 1 # Reduce parallelism to improve optimization quality
strip = true      # Strip symbols to clean up the binary tables
panic = "abort"   # Reduce binary size by removing stack unwinding
